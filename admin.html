<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - SMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js" defer></script>
    
    <style>
        /* Responsive Table to Cards for Mobile */
        @media (max-width: 768px) {
            #adminDashboard { padding: 15px !important; }
            .panel-header { flex-direction: column; gap: 15px; text-align: center; }
            .panel-header > div { justify-content: center; width: 100%; }
            
            table, thead, tbody, th, td, tr { display: block; width: 100%; box-sizing: border-box; }
            thead tr { position: absolute; top: -9999px; left: -9999px; } 
            
            tr { border: 1px solid var(--border-color) !important; margin-bottom: 20px; border-radius: 8px; background: #fff; padding: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
            
            td { 
                border: none; border-bottom: 1px solid #f1f5f9; position: relative; 
                padding: 12px 10px 12px 40% !important; text-align: right !important; font-size: 13px; min-height: 40px;
            }
            td:last-child { border-bottom: none; }
            
            td:before { 
                position: absolute; top: 12px; left: 10px; width: 35%; padding-right: 10px; 
                white-space: nowrap; font-weight: 600; text-align: left; color: var(--text-muted); 
                font-size: 11px; text-transform: uppercase;
            }
            
            td:nth-of-type(1):before { content: "User Info"; }
            td:nth-of-type(2):before { content: "Contact"; }
            td:nth-of-type(3):before { content: "Role"; }
            td:nth-of-type(4):before { content: "Payment"; }
            td:nth-of-type(5):before { content: "Actions"; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: var(--bg-app); overflow-x: hidden;">
    
    <div id="adminAuthScreen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--brand-dark); z-index: 100; position: absolute; width: 100%;">
        <div style="background: white; padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-soft); width: 90%; max-width: 320px; text-align: center; border: 1px solid var(--border-color); box-sizing: border-box;">
            <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
            <h2 style="margin-top: 0; color: var(--brand-dark);">Admin Portal</h2>
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Authorized personnel only</p>
            
            <input type="email" id="adminEmail" placeholder="Admin Email" style="margin-bottom: 12px; width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box;">
            <input type="password" id="adminPassword" placeholder="Password" style="margin-bottom: 20px; width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box;">
            
            <button class="btn btn-gradient full-width shadow-hover" onclick="handleAdminLogin()" style="margin-bottom: 10px;">Secure Login</button>
            <button class="btn btn-glass full-width" style="color: var(--text-muted); border-color: var(--border-color);" onclick="window.location.href='index.html'">Return to App</button>
            
            <p id="adminAuthMsg" style="color: var(--danger); font-size: 12px; margin-top: 15px; min-height: 18px;"></p>
        </div>
    </div>

    <div id="adminDashboard" style="display: none; padding: 40px; overflow-y: auto; height: 100vh; width: 100%; box-sizing: border-box;">
        <div class="panel" style="max-width: 1100px; margin: 0 auto; overflow: visible;">
            <div class="panel-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="brand-icon">🛡️</div>
                    <h2 style="margin: 0; color: var(--brand-dark);">Admin Dashboard</h2>
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                    <button class="btn btn-outline-primary" onclick="window.location.href='index.html'">Main App</button>
                    <button class="btn btn-danger" onclick="adminLogout()">Log Out</button>
                </div>
            </div>
            
            <div class="panel-body" style="padding: 20px; overflow: visible;">
                
                <div style="margin-bottom: 20px;">
                    <input type="text" id="searchInput" placeholder="🔍 Search users by name, email, phone, or status..." style="width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: var(--radius-md); box-sizing: border-box; font-family: inherit; font-size: 14px; background: #f8fafc; transition: all 0.2s;">
                </div>

                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-muted);">
                            <th style="padding: 12px;">User Info</th>
                            <th style="padding: 12px;">Contact Details</th>
                            <th style="padding: 12px;">Account Role</th>
                            <th style="padding: 12px;">Payment Status</th>
                            <th style="padding: 12px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="5" style="text-align: center; padding: 20px;">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
